version: '3.9'

services:
  auth-service:
    build: .
    container_name: nexora-auth
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/auth_db
      DB_USER: ${DB_USER:-nexora_user}
      DB_PASS: ${DB_PASS:-nexora_pass}
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexora-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: nexora-auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${DB_USER:-nexora_user}
      POSTGRES_PASSWORD: ${DB_PASS:-nexora_pass}
    volumes:
      - auth_pg_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nexora_user} -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexora-net

  redis:
    image: redis:7.2-alpine
    container_name: nexora-auth-redis
    command: redis-server --requirepass ${REDIS_PASS:-} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexora-net

volumes:
  auth_pg_data:

networks:
  nexora-net:
    driver: bridge
