services:
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: nexora-auth
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://auth-db:5432/auth_db
      DB_USER: ${DB_USER:-nexora_user}
      DB_PASS: ${DB_PASS:-nexora_pass}
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-changeme}
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexora-net
    restart: unless-stopped

  assessment-service:
    build:
      context: ./assessment-service
      dockerfile: Dockerfile
    container_name: nexora-assessment
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://assessment-db:5432/assessment_db
      DB_USER: ${DB_USER:-nexora_user}
      DB_PASS: ${DB_PASS:-nexora_pass}
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      JWT_SECRET: ${JWT_SECRET:-changeme}
    depends_on:
      assessment-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - nexora-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexora-frontend
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - assessment-service
    networks:
      - nexora-net
    restart: unless-stopped

  auth-db:
    image: postgres:16-alpine
    container_name: nexora-auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${DB_USER:-nexora_user}
      POSTGRES_PASSWORD: ${DB_PASS:-nexora_pass}
    volumes:
      - auth_pg_data:/var/lib/postgresql/data
      - ./auth-service/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nexora_user} -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexora-net

  assessment-db:
    image: postgres:16-alpine
    container_name: nexora-assessment-db
    environment:
      POSTGRES_DB: assessment_db
      POSTGRES_USER: ${DB_USER:-nexora_user}
      POSTGRES_PASSWORD: ${DB_PASS:-nexora_pass}
    volumes:
      - assessment_pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nexora_user} -d assessment_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexora-net

  redis:
    image: redis:7.2-alpine
    container_name: nexora-redis
    command: redis-server --requirepass ${REDIS_PASS:-} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASS:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexora-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: nexora-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexora-net
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  auth_pg_data:
  assessment_pg_data:
  rabbitmq_data:

networks:
  nexora-net:
    driver: bridge
