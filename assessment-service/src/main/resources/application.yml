spring:
  application:
    name: assessment-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

nexora:
  jwt:
    jwks-uri: ${JWKS_URI:http://auth-service:8081/.well-known/jwks.json}
  piston:
    base-url: ${PISTON_BASE_URL:https://emkc.org/api/v2/piston}
  course-service:
    base-url: ${COURSE_SERVICE_URL:http://localhost:8083}
  progress-service:
    base-url: ${PROGRESS_SERVICE_URL:http://localhost:8084}
  ai-service:
    base-url: ${AI_SERVICE_URL:http://localhost:8085}
    internal-key: ${X_INTERNAL_KEY:nexora-internal-key}
  category:
    thresholds:
      beginner: 0
      basic: 8
      advanced: 14
      expert: 18
